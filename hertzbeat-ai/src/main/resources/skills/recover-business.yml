name: recover-business
description: "Recover business service when firing alerts are detected"
version: "1.0"

output:
  type: report
  format: markdown
  language: zh
  contentStep: recovery_summary

parameters:
  - name: host
    type: string
    description: "SSH target host"
    required: true
  - name: username
    type: string
    description: "SSH username"
    required: true
  - name: password
    type: string
    description: "SSH password (required when privateKeyPath is not provided)"
    required: false
  - name: privateKeyPath
    type: string
    description: "Local private key file path (optional)"
    required: false
  - name: port
    type: integer
    description: "SSH port, default 22"
    required: false
    defaultValue: "22"
  - name: command
    type: string
    description: "Recovery command to run"
    required: true
  - name: timeoutMs
    type: integer
    description: "SSH command timeout (ms), default from system config hertzbeat.ai.ssh.timeoutMs"
    required: false
  - name: workingDir
    type: string
    description: "Working directory for command execution"
    required: false
  - name: correlationId
    type: string
    description: "Correlation id for linking logs and evidence"
    required: false
  - name: description
    type: string
    description: "Execution description for audit"
    required: false

steps:
  - id: check_alerts_before
    type: tool
    tool: query_alerts
    args:
      status: "firing"
      pageSize: 20
      pageIndex: 0
      sort: "startAt"
      order: "desc"

  - id: execute_recovery
    type: tool
    tool: ssh_execute_recovery
    args:
      host: "${host}"
      port: "${port}"
      username: "${username}"
      password: "${password}"
      privateKeyPath: "${privateKeyPath}"
      command: "${command}"
      timeoutMs: "${timeoutMs}"
      workingDir: "${workingDir}"
      correlationId: "${correlationId}"
      description: "${description}"

  - id: check_alerts_after
    type: tool
    tool: query_alerts
    args:
      status: "firing"
      pageSize: 20
      pageIndex: 0
      sort: "startAt"
      order: "desc"

  - id: recovery_summary
    type: llm
    prompt: |
      你是一个运维响应助手，请输出一份简洁的故障处理报告。
      要求：
      1. 输出本次执行的 correlationId
      2. 对比恢复前后告警情况
      3. 总结 ssh_execute_recovery 的执行结果（是否成功、退出码、是否有 stderr）
      4. 给出处理结论（恢复成功 / 仍有风险）
      5. 给出下一步建议

      恢复前告警:
      ${check_alerts_before}

      恢复执行结果:
      ${execute_recovery}

      恢复后告警:
      ${check_alerts_after}
